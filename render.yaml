databases:
  - name: gemini-db
    databaseName: gemini_db
    user: gemini_user
    plan: free

services:
  # Backend API
  - type: web
    name: gemini-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/server-simple.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gemini-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_STORE
        sync: false
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /api/health

  # Frontend Static Site
  - type: web
    name: gemini-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gemini-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
